# Typical Case
# Стандартная ситуация с умеренной конкуренцией.
typical:
  game:
    description: "Конкуренция провайдеров облачной инфраструктуры (SaaS B2B)"
    matrix:
      - [12, 18]   # Стратегия A1: базовые тарифы vs B1/B2
      - [25, 8]    # Стратегия A2: премиум-поддержка vs B1/B2
    # Пояснение матрицы:
    # - (A1, B1): оба снизили цены, прибыль умеренная.
    # - (A1, B2): А демпингует, пока B держит высокие цены, А забирает часть клиентов.
    # - (A2, B1): А продает дорого, B дешево. Но у А лояльные enterprise-клиенты.
    # - (A2, B2): оба ставят высокие цены, рынок стагнирует, прибыль падает.
    # Седловой точки нет, алгоритм найдет смешанные стратегии.

  optimization:
    cost: 500           # Себестоимость содержания сервера/месяц
    min_margin_pct: 30  # Минимальная наценка для окупаемости
    max_price: 1200     # Психологический максимум рынка
    # Ожидаемый результат: минимальная цена 500 * 1.3 = 650. Оптимальная = 1200.

# Агрессивная конкуренция
# Матрица 3x3 без чистого равновесия.
aggressive:
  game:
    description: "Война агрегаторов такси за водителей и пассажиров"
    matrix:
      - [7, 12, 9]    # Стратегия A1: огромные скидки пассажирам
      - [14, 5, 10]   # Стратегия A2: стандартный тариф
      - [6, 15, 8]    # Стратегия A3: доплаты водителям
    # Характеристика:
    # - Седловой точки нет.
    # - Nashpy найдет вероятностное распределение между тремя стратегиями
    #   для минимизации рисков при любом ответе конкурента.

  optimization:
    cost: 150           # Средняя себестоимость одной поездки
    min_margin_pct: 25  # Целевая маржа платформы
    max_price: 450      # Максимальный тариф, при котором пассажиры не уйдут в метро
    # Риск: минимальная цена = 150 * 1.25 = 187.5. 
    # Ограничение до 450 позволяет найти решение. Status: optimal.

# Edge Case
# Невозможная ситуация: требуемая маржа противоречит рыночной цене.
infeasible:
  game:
    description: "Рынок спешелти-кофе в условиях инфляции"
    matrix:
      - [6, 3]
      - [5, 7]

  optimization:
    cost: 2500          # Сильно выросшая закупочная цена зерна
    min_margin_pct: 40  # Инвесторы требуют 40% маржи
    max_price: 3000     # Покупатели не готовы платить больше 3000 за упаковку
    # Проблема: 2500 * 1.4 = 3500₽ (минимально допустимая цена для бизнеса).
    # Но 3500 > 3000 (верхняя граница рынка). 
    # Ожидаемый результат: status = "infeasible".
    # Сообщение: "Конфликт ограничений..."

# Стрессовый сценарий
# Расширенная матрица 4x4 для проверки вычислительной нагрузки.
stress:
  game:
    description: "Ценовые войны авиакомпаний на трансконтинентальных направлениях"
    matrix:
      - [8, 15, 12, 5]    # A1: Агрессивный демпинг
      - [10, 6, 14, 9]    # A2: Промо-тарифы с ограничениями
      - [4, 11, 7, 16]    # A3: Стандартный эконом-класс
      - [13, 9, 5, 10]    # A4: Премиум-эконом с доп. багажом
    # Характеристика:
    # - Матрица 4x4 значительно увеличивает количество перебираемых носителей 
    #   (support enumeration) в библиотеке Nashpy.
    # - Проверяет стабильность работы алгоритма при росте размерности.

  optimization:
    cost: 15000         # Себестоимость кресла на рейсе (₽)
    min_margin_pct: 12  # Минимальная маржа для покрытия лизинга
    max_price: 35000    # Предельная цена, выше которой спрос падает до нуля
    # Минимально допустимая цена: 15000 * 1.12 = 16800.
    # Ограничения не конфликтуют, ЛП-солвер должен успешно отработать.